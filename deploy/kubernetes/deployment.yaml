apiVersion: apps/v1
kind: Deployment
metadata:
  name: claw-device-pairing
  labels:
    app: claw-device-pairing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claw-device-pairing
  template:
    metadata:
      labels:
        app: claw-device-pairing
        claw.sandbox.redhat.com/instance: "default"
    spec:
      serviceAccountName: claw-device-pairing
      volumes:
      - name: tls
        secret:
          secretName: claw-device-pairing-tls
      - name: proxy-secret
        secret:
          secretName: claw-device-pairing-proxy
      containers:
      - name: server
        image: quay.io/codeready-toolchain/claw-device-pairing:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CLAW_INSTANCE
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['claw.sandbox.redhat.com/instance']
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - wget
            - -q
            - --spider
            - http://localhost:8080/health
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - wget
            - -q
            - --spider
            - http://localhost:8080/health
          initialDelaySeconds: 3
          periodSeconds: 5
      - name: oauth-proxy
        image: registry.redhat.io/openshift4/ose-oauth-proxy:v4.14
        ports:
        - containerPort: 8443
          name: oauth-proxy
        args:
        - --https-address=:8443
        - --provider=openshift
        - --upstream=http://localhost:8080
        - --tls-cert=/etc/tls/private/tls.crt
        - --tls-key=/etc/tls/private/tls.key
        - --cookie-secret-file=/etc/proxy/secrets/session_secret
        - --cookie-name=_oauth_proxy
        - --cookie-secure=true
        - --openshift-sar={"resource":"pods","verb":"get","namespace":"$(NAMESPACE)"}
        - --openshift-service-account=claw-device-pairing
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        - name: tls
          mountPath: /etc/tls/private
          readOnly: true
        - name: proxy-secret
          mountPath: /etc/proxy/secrets
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
